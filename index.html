<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" href="https://cdn-icons-png.flaticon.com/512/565/565547.png">

<title>Security Check</title>

<style>
:root {
    --green-main: #008000;
    --green-light: #19c37d;
    --green-dark: #062e1c;
    --text: #ecfff4;
    --muted: rgba(236,255,244,0.65);
}

/* BACKGROUND */
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', sans-serif;
    color: var(--text);
    overflow: hidden;

    background: radial-gradient(circle at 20% 30%, #0f3d2b, transparent 50%),
                radial-gradient(circle at 80% 70%, #0a2e21, transparent 50%),
                linear-gradient(135deg, #061f16, #0b3d2a);
}

/* soft glow layer */
body::before {
    content: "";
    position: absolute;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(0,255,120,0.15), transparent 60%);
    filter: blur(100px);
    animation: float 12s ease-in-out infinite;
}

@keyframes float {
    0%,100% { transform: translate(0,0); }
    50% { transform: translate(60px,-40px); }
}

/* CARD */
.portal-card {
    width: 360px;
    padding: 45px;
    border-radius: 22px;
    background: rgba(8, 30, 20, 0.75);
    backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.05);
    box-shadow: 0 20px 50px rgba(0,0,0,0.6);
    text-align: center;
    animation: fadeIn 0.6s ease;
}

/* LOGO */
.logo {
    width: 62px;
    height: 62px;
    margin: auto;
    margin-bottom: 18px;
    border-radius: 50%;
    background: linear-gradient(135deg, #00ff88, #008000);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 15px rgba(0,255,100,0.3);
}

.logo svg {
    width: 30px;
    stroke: #002d16;
}

/* TEXT */
.sub-header {
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 0.6px;
    margin-bottom: 6px;
}

.main-title {
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 22px;
}

/* CAPTCHA AREA */
.captcha-area {
    padding: 16px;
    border-radius: 12px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    margin-bottom: 25px;
}

/* STATUS */
.status {
    font-size: 13px;
    color: var(--muted);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
}

/* DOT */
.dot {
    width: 6px;
    height: 6px;
    background: var(--green-light);
    border-radius: 50%;
    animation: blink 1.4s infinite;
}

@keyframes blink {
    0%,100% { opacity: 0.3; }
    50% { opacity: 1; }
}

/* FOOTER */
.footer {
    margin-top: 18px;
    font-size: 12px;
    color: var(--muted);
}

/* FADE */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(15px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<div class="portal-card">

    <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
            <path d="M12 2L3 7V17L12 22L21 17V7L12 2Z"/>
            <path d="M12 22V12"/>
            <path d="M21 7L12 12L3 7"/>
        </svg>
    </div>

    <div class="sub-header">Are you human?</div>
    <div class="main-title">Complete the CAPTCHA</div>

    <!-- Cloudflare Turnstile Script -->
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

<div class="captcha-area">
    <div class="cf-turnstile" 
         data-sitekey="0x4AAAAAAC1fwmjDvL-9ih1Z">
    </div>
</div>
    <div class="captcha-area">
        <small style="opacity:0.6;">Please complete the verification below</small>
    </div>

    <div class="status">
        <div class="dot"></div>
        <span>Waiting for secure verification</span>
    </div>

    <div class="footer">
        Protected by Cloud Security
    </div>

</div>

</body>
</html>
